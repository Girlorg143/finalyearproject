<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Agri Supply Chain Management</title>
    <link rel="stylesheet" href="/static/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Left Side - Illustration -->
            <div class="auth-left">
                <div class="auth-left-content">
                    <div class="auth-icon">
                        <i class="fas fa-key"></i>
                    </div>
                    <h1>Reset Password</h1>
                    <p>Securely reset your password to regain access to your agricultural supply chain account</p>
                    <div class="auth-features">
                        <div class="feature-item">
                            <i class="fas fa-shield-alt"></i>
                            <span>Secure Process</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-lock"></i>
                            <span>Encrypted Storage</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-user-check"></i>
                            <span>Verified Access</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side - Forgot Password Form -->
            <div class="auth-right">
                <div class="auth-header">
                    <h2>Forgot Password</h2>
                    <p>Enter your email address and create a new password to reset your account</p>
                </div>

                <form id="forgotPasswordForm" class="auth-form">
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email Address *
                        </label>
                        <input type="email" name="email" id="email" placeholder="Enter your registered email address" required>
                    </div>

                    <!-- New Password Field -->
                    <div class="form-group">
                        <label for="new_password">
                            <i class="fas fa-lock"></i>
                            New Password *
                        </label>
                        <input type="password" name="new_password" id="new_password" placeholder="Enter your new password" required>
                        <div class="password-toggle" onclick="toggleNewPassword()">
                            <i class="fas fa-eye" id="newToggleIcon"></i>
                        </div>
                    </div>

                    <!-- Confirm Password Field -->
                    <div class="form-group">
                        <label for="confirm_password">
                            <i class="fas fa-lock"></i>
                            Confirm New Password *
                        </label>
                        <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm your new password" required>
                        <div class="password-toggle" onclick="toggleConfirmPassword()">
                            <i class="fas fa-eye" id="confirmToggleIcon"></i>
                        </div>
                    </div>

                    <!-- Reset Button -->
                    <button type="submit" class="auth-button">
                        <i class="fas fa-key"></i>
                        Reset Password
                    </button>

                    <!-- Message Display -->
                    <div id="forgotMessage" class="auth-message" style="display: none;"></div>
                </form>

                <!-- Links -->
                <div class="auth-links">
                    <div class="auth-link-item">
                        <span>Remember your password?</span>
                        <a href="/login">
                            <i class="fas fa-sign-in-alt"></i>
                            Sign In
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Password toggle functionality
        function toggleNewPassword() {
            const passwordField = document.getElementById('new_password');
            const toggleIcon = document.getElementById('newToggleIcon');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        function toggleConfirmPassword() {
            const passwordField = document.getElementById('confirm_password');
            const toggleIcon = document.getElementById('confirmToggleIcon');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Password confirmation validation
        document.getElementById('confirm_password').addEventListener('input', function() {
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = this.value;
            
            if (confirmPassword && newPassword !== confirmPassword) {
                this.setCustomValidity('Passwords do not match');
            } else {
                this.setCustomValidity('');
            }
        });

        // Form submission
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const button = e.target.querySelector('.auth-button');
            const messageDiv = document.getElementById('forgotMessage');
            
            // Show loading state
            button.classList.add('loading');
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting Password...';
            messageDiv.style.display = 'none';
            
            const formData = new FormData(e.target);
            const data = {
                email: formData.get('email'),
                new_password: formData.get('new_password'),
                confirm_password: formData.get('confirm_password')
            };
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Show success message
                    messageDiv.className = 'auth-message success';
                    messageDiv.innerHTML = '<i class="fas fa-check-circle"></i> Password reset successfully! Redirecting to login...';
                    messageDiv.style.display = 'block';
                    
                    // Redirect to login page
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    // Show error message
                    messageDiv.className = 'auth-message error';
                    messageDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${result.msg || 'Password reset failed. Please try again.'}`;
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Password reset error:', error);
                messageDiv.className = 'auth-message error';
                messageDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Network error. Please check your connection and try again.';
                messageDiv.style.display = 'block';
            } finally {
                // Reset button state
                button.classList.remove('loading');
                button.innerHTML = '<i class="fas fa-key"></i> Reset Password';
            }
        });
    </script>
</body>
</html>
