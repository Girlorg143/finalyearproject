<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agri Supply Chain Management</title>
    <link rel="stylesheet" href="/static/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Left Side - Illustration -->
            <div class="auth-left">
                <div class="auth-left-content">
                    <div class="auth-icon">
                        <i class="fas fa-seedling"></i>
                    </div>
                    <h1>Agri Supply Chain</h1>
                    <p>Transforming agriculture through intelligent supply chain management from farm to market</p>
                    <div class="auth-features">
                        <div class="feature-item">
                            <i class="fas fa-check-circle"></i>
                            <span>Real-time Tracking</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-check-circle"></i>
                            <span>Quality Assurance</span>
                        </div>
                                            </div>
                </div>
            </div>

            <!-- Right Side - Login Form -->
            <div class="auth-right">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your agricultural supply chain dashboard</p>
                </div>

                <form id="loginForm" class="auth-form">
                    <!-- Role Field -->
                    <div class="form-group">
                        <label for="role">
                            <i class="fas fa-user-tag"></i>
                            Select Role *
                        </label>
                        <select name="role" id="role" required onchange="toggleWarehouseField()">
                            <option value="">Choose your role</option>
                            <option value="farmer">🌾 Farmer</option>
                            <option value="warehouse">🏭 Warehouse</option>
                            <option value="logistics">🚚 Logistics</option>
                            <option value="admin">⚙️ Admin</option>
                        </select>
                    </div>

                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email Address *
                        </label>
                        <input type="email" name="email" id="email" placeholder="Enter your email address" required>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password *
                        </label>
                        <input type="password" name="password" id="password" placeholder="Enter your password" required>
                        <div class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </div>
                    </div>

                    <!-- Warehouse Location Field (Hidden by default) -->
                    <div class="form-group" id="warehouseLocationGroup" style="display: none;">
                        <label for="warehouse_location">
                            <i class="fas fa-warehouse"></i>
                            Warehouse Location *
                        </label>
                        <select name="warehouse_location" id="warehouse_location">
                            <option value="">Select Warehouse Location</option>
                        </select>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="auth-button">
                        <i class="fas fa-sign-in-alt"></i>
                        Sign In
                    </button>

                    <!-- Message Display -->
                    <div id="loginMessage" class="auth-message" style="display: none;"></div>
                </form>

                <!-- Links -->
                <div class="auth-links">
                    <div class="auth-link-item">
                        <a href="/forgot-password">
                            <i class="fas fa-key"></i>
                            Forgot Password?
                        </a>
                    </div>
                    <div class="auth-link-item">
                        <span>New to our platform?</span>
                        <a href="/signup">
                            <i class="fas fa-user-plus"></i>
                            Create Account
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Password toggle functionality
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Toggle warehouse location field based on role selection
        function toggleWarehouseField() {
            const roleSelect = document.getElementById('role');
            const warehouseGroup = document.getElementById('warehouseLocationGroup');
            const warehouseSelect = document.getElementById('warehouse_location');
            
            if (roleSelect.value === 'warehouse') {
                warehouseGroup.style.display = 'block';
                warehouseSelect.required = true;
                loadWarehouseLocations();
            } else {
                warehouseGroup.style.display = 'none';
                warehouseSelect.required = false;
                warehouseSelect.value = '';
            }
        }

        // Load warehouse locations from API
        async function loadWarehouseLocations() {
            const warehouseSelect = document.getElementById('warehouse_location');
            
            try {
                const response = await fetch('/api/auth/warehouse-locations');
                const result = await response.json();
                
                if (response.ok) {
                    warehouseSelect.innerHTML = '<option value="">Select Warehouse Location</option>';
                    result.warehouse_locations.forEach(location => {
                        const option = document.createElement('option');
                        option.value = location;
                        option.textContent = location;
                        warehouseSelect.appendChild(option);
                    });
                } else {
                    console.error('Failed to load warehouse locations:', result.msg);
                    // Fallback options
                    warehouseSelect.innerHTML = '<option value="">Select Warehouse Location</option>' +
                        '<option value="Delhi Warehouse">Delhi Warehouse</option>' +
                        '<option value="Chandigarh Warehouse">Chandigarh Warehouse</option>' +
                        '<option value="Bengaluru Warehouse">Bengaluru Warehouse</option>' +
                        '<option value="Hyderabad Warehouse">Hyderabad Warehouse</option>' +
                        '<option value="Kolkata Warehouse">Kolkata Warehouse</option>' +
                        '<option value="Bhubaneswar Warehouse">Bhubaneswar Warehouse</option>' +
                        '<option value="Mumbai Warehouse">Mumbai Warehouse</option>' +
                        '<option value="Ahmedabad Warehouse">Ahmedabad Warehouse</option>' +
                        '<option value="Nagpur Central Warehouse">Nagpur Central Warehouse</option>';
                }
            } catch (error) {
                console.error('Error loading warehouse locations:', error);
                // Fallback options
                warehouseSelect.innerHTML = '<option value="">Select Warehouse Location</option>' +
                    '<option value="Delhi Warehouse">Delhi Warehouse</option>' +
                    '<option value="Chandigarh Warehouse">Chandigarh Warehouse</option>' +
                    '<option value="Bengaluru Warehouse">Bengaluru Warehouse</option>' +
                    '<option value="Hyderabad Warehouse">Hyderabad Warehouse</option>' +
                    '<option value="Kolkata Warehouse">Kolkata Warehouse</option>' +
                    '<option value="Bhubaneswar Warehouse">Bhubaneswar Warehouse</option>' +
                    '<option value="Mumbai Warehouse">Mumbai Warehouse</option>' +
                    '<option value="Ahmedabad Warehouse">Ahmedabad Warehouse</option>' +
                    '<option value="Nagpur Central Warehouse">Nagpur Central Warehouse</option>';
            }
        }

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const button = e.target.querySelector('.auth-button');
            const messageDiv = document.getElementById('loginMessage');
            
            // Show loading state
            button.classList.add('loading');
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
            messageDiv.style.display = 'none';
            
            const formData = new FormData(e.target);
            const data = {
                email: formData.get('email'),
                password: formData.get('password')
            };
            
            // Add warehouse_location if warehouse role
            if (formData.get('role') === 'warehouse') {
                data.warehouse_location = formData.get('warehouse_location');
            }
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Store authentication data
                    localStorage.setItem('access_token', result.access_token);
                    localStorage.setItem('user_role', result.role);
                    localStorage.setItem('user_email', result.email || data.email);
                    
                    // Store warehouse_location for warehouse users
                    if (result.role === 'warehouse') {
                        // Extract warehouse_location from JWT token
                        try {
                            const tokenPayload = JSON.parse(atob(result.access_token.split('.')[1]));
                            if (tokenPayload.warehouse_location) {
                                localStorage.setItem('warehouse_location', tokenPayload.warehouse_location);
                            }
                        } catch (e) {
                            console.error('Error parsing JWT token:', e);
                        }
                    }
                    
                    // Show success message
                    messageDiv.className = 'auth-message success';
                    messageDiv.innerHTML = '<i class="fas fa-check-circle"></i> Login successful! Redirecting...';
                    messageDiv.style.display = 'block';
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1500);
                } else {
                    // Show error message
                    messageDiv.className = 'auth-message error';
                    messageDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${result.msg || 'Login failed. Please check your credentials.'}`;
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                messageDiv.className = 'auth-message error';
                messageDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Network error. Please check your connection and try again.';
                messageDiv.style.display = 'block';
            } finally {
                // Reset button state
                button.classList.remove('loading');
                button.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        });
    </script>
</body>
</html>
